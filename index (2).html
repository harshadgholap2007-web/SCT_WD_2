<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Stopwatch</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    overflow:hidden;
}

.container{
    width:420px;
    max-width:95%;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:35px;
    text-align:center;
    color:#fff;
    box-shadow:0 20px 45px rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.2);
}

h1{
    font-size:34px;
    margin-bottom:8px;
    letter-spacing:1px;
}

.subtitle{
    color:#ddd;
    margin-bottom:30px;
    font-size:15px;
}

.time{
    font-size:52px;
    font-weight:bold;
    letter-spacing:3px;
    margin-bottom:30px;
    text-shadow:2px 2px 8px rgba(0,0,0,.4);
}

.buttons{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

button{
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.3);
}

#startBtn{
    background:#22c55e;
    color:white;
}

#pauseBtn{
    background:#f59e0b;
    color:white;
}

#resetBtn{
    background:#ef4444;
    color:white;
}

#lapBtn{
    background:#3b82f6;
    color:white;
}

.lap-section{
    margin-top:30px;
    text-align:left;
}

.lap-section h2{
    margin-bottom:12px;
    text-align:center;
    font-size:24px;
}

#laps{
    list-style:none;
    max-height:220px;
    overflow-y:auto;
}

#laps li{
    background:rgba(255,255,255,.15);
    margin:10px 0;
    padding:12px 15px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    animation:slide .4s ease;
}

@keyframes slide{
    from{
        transform:translateX(-30px);
        opacity:0;
    }
    to{
        transform:translateX(0);
        opacity:1;
    }
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:white;
    border-radius:20px;
}

@media(max-width:500px){

.container{
    padding:25px;
}

.time{
    font-size:36px;
}

button{
    font-size:14px;
    padding:12px;
}

}
</style>
</head>

<body>

<div class="container">

<h1>⏱ Stopwatch</h1>

<p class="subtitle">
Measure time accurately with lap tracking
</p>

<div class="time" id="display">
00:00:00:00
</div>

<div class="buttons">

<button id="startBtn">
▶ Start
</button>

<button id="pauseBtn">
⏸ Pause
</button>

<button id="resetBtn">
🔄 Reset
</button>

<button id="lapBtn">
🏁 Lap
</button>

</div>

<div class="lap-section">

<h2>Lap Times</h2>

<ul id="laps">

</ul>

</div>

</div>

<script>// Stopwatch Variables
let startTime = 0;
let elapsedTime = 0;
let timer = null;
let running = false;
let lapCount = 1;

// Get HTML Elements
const display = document.getElementById("display");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");
const lapBtn = document.getElementById("lapBtn");
const laps = document.getElementById("laps");

// Format Time Function
function formatTime(time){

    let hours = Math.floor(time / 3600000);
    let minutes = Math.floor((time % 3600000) / 60000);
    let seconds = Math.floor((time % 60000) / 1000);
    let milliseconds = Math.floor((time % 1000) / 10);

    hours = String(hours).padStart(2,'0');
    minutes = String(minutes).padStart(2,'0');
    seconds = String(seconds).padStart(2,'0');
    milliseconds = String(milliseconds).padStart(2,'0');

    return `${hours}:${minutes}:${seconds}:${milliseconds}`;
}

// Update Stopwatch Display
function updateDisplay(){

    const currentTime = Date.now() - startTime + elapsedTime;

    display.textContent = formatTime(currentTime);

}

// Start Stopwatch
startBtn.addEventListener("click",()=>{

    if(!running){

        startTime = Date.now();

        timer = setInterval(updateDisplay,10);

        running = true;

    }

});

// Pause Stopwatch
pauseBtn.addEventListener("click",()=>{

    if(running){

        clearInterval(timer);

        elapsedTime += Date.now() - startTime;

        running = false;

    }

});

// Lap Time
lapBtn.addEventListener("click",()=>{

    if(running){

        const currentTime = Date.now() - startTime + elapsedTime;

        const li = document.createElement("li");

        li.innerHTML =
        `<span>Lap ${lapCount}</span>
         <span>${formatTime(currentTime)}</span>`;

        laps.prepend(li);

        lapCount++;

    }

});// Reset Stopwatch
resetBtn.addEventListener("click", () => {

    // Stop the timer if running
    clearInterval(timer);

    // Reset all variables
    running = false;
    startTime = 0;
    elapsedTime = 0;
    lapCount = 1;

    // Reset display
    display.textContent = "00:00:00:00";

    // Clear all lap times
    laps.innerHTML = "";

});

// Disable Lap when stopwatch is not running
lapBtn.addEventListener("click", () => {

    if (!running) {
        alert("Start the stopwatch first!");
    }

});

// Initialize display on page load
display.textContent = "00:00:00:00";
